services:
  # ---------------------------------------------------------------------------
  # API – FastAPI mit Uvicorn, einziger HTTP‑Entrypoint für die Anwendung
  # ---------------------------------------------------------------------------
  api:
    build:
      context: ..
      dockerfile: docker/dockerfiles/dockerfile_fastAPI
    command: uvicorn src.api:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      DB_CONN: postgresql://${POSTGRES_USER:-vikmar}:${POSTGRES_PASSWORD:-vikmar}@postgres:5432/fastapi_db
      PREFECT_API_URL: http://prefect:4200/api
      MODEL_NAME: test_name           # ← neu
      MODEL_ALIAS: champion           # ← neu
      MLFLOW_TRACKING_URI: http://mlflow:5000
    volumes:
      - ../:/app
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - mle_network

  # ---------------------------------------------------------------------------
  # Grafana – Dashboards für Prometheus-Metriken
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:10.0.1          # 13.0.1 existiert nicht
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - mle_network

  # ---------------------------------------------------------------------------
  # MLflow – Tracking Server (Pfade bleiben unverändert)
  # ---------------------------------------------------------------------------
  mlflow:
    image: python:3.11-slim
    working_dir: /app
    depends_on:
      postgres:
        condition: service_healthy
    command:
      - /bin/sh
      - -lc
      - |
        pip install --no-cache-dir mlflow==3.11.1 psycopg2-binary==2.9.11 && \
        mkdir -p /app/storage/mlartifacts && \
        mlflow server \
          --host 0.0.0.0 \
          --port 5000 \
          --backend-store-uri postgresql://${POSTGRES_USER:-vikmar}:${POSTGRES_PASSWORD:-vikmar}@postgres:5432/mlflow \
          --serve-artifacts \
          --artifacts-destination /app/storage/mlartifacts \
          --allowed-hosts '*'
    ports:
      - "5001:5000"
    volumes:
      - ../:/app          # ← unverändert laut Vorgabe
    networks:
      - mle_network

  # ---------------------------------------------------------------------------
  # Prefect – Orchestrierung
  # ---------------------------------------------------------------------------
  prefect:
    image: prefecthq/prefect:3.6.25-python3.11
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PREFECT_API_DATABASE_CONNECTION_URL: postgresql+asyncpg://${POSTGRES_USER:-vikmar}:${POSTGRES_PASSWORD:-vikmar}@postgres:5432/prefect
    command:
      - /bin/sh
      - -lc
      - |
        pip install --no-cache-dir asyncpg==0.31.0 && \
        prefect server start --host 0.0.0.0
    ports:
      - "4200:4200"
    networks:
      - mle_network

  # ---------------------------------------------------------------------------
  # Prometheus – Metrik-Sammler
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v3.7.3
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    depends_on:
      - api
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - mle_network


  # ---------------------------------------------------------------------------
  # PostgreSQL – einziger Datenbankdienst, erzeugt mehrere Datenbanken per
  # init-Skript. Alle anderen Dienste (MLflow, Prefect, API) hängen von ihm ab.
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:17
    container_name: postgres
    restart: "no"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vikmar}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vikmar}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vikmar} -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - mle_network

# ---------------------------------------------------------------------------
# Traffic Simulator
# ---------------------------------------------------------------------------
  simulator:
    image: docker-api
    working_dir: /app
    depends_on:
      - api
    networks:
      - mle_network
    volumes:
      - ./simulator/simulate_traffic.py:/app/simulate_traffic.py:ro
    command: python /app/simulate_traffic.py
    environment:
      API_URL: http://api:8000/predict
      MLFLOW_TRACKING_URI: http://mlflow:5000
      DB_SOURCE_TABLE: dbt_staging.flights_subset_intra_covid
      SLEEP_SEC: 2
      MODEL_NAME: ${MODEL_NAME:-}
      MODEL_ALIAS: ${MODEL_ALIAS:-}
    restart: "no"


  # ---------------------------------------------------------------------------
  # Bootstrapping for Postgres
  # ---------------------------------------------------------------------------
  bootstrap:
    image: docker-api
    working_dir: /app
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - mle_network
    volumes:
      - ../:/app   # damit das Skript in docker/scripts/ gefunden wird
    command: python docker/scripts/bootstrap_db.py
    restart: "no"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vikmar}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vikmar}
    # Optionale Profile: bootstrap läuft nur, wenn du `--profile init` angibst
    profiles:
      - init


     




# ---------------------------------------------------------------------------
# Infrastruktur
# ---------------------------------------------------------------------------
networks:
  mle_network:
    driver: bridge

volumes:
  postgres_data:




